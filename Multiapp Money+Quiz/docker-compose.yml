services:
  # Quiz App Backend
  quiz-backend:
    image: amihsan/quiz-backend:latest
    container_name: quiz-backend
    restart: always
    env_file:
      - ./quiz-app/backend/.env

  # Money Tracker Backend
  money-backend:
    image: amihsan/money-tracker-backend:latest
    container_name: money-backend
    restart: always
    env_file:
      - ./money-tracker/backend/.env

  # NGINX Reverse Proxy (serves both React apps)
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile # Dockerfile with both React builds
    container_name: nginx
    restart: always
    volumes:
      - ./ssl/certbot/conf:/etc/letsencrypt
      - ./ssl/certbot/www:/var/www/certbot
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - quiz-backend
      - money-backend

  # Certbot for HTTPS renewal
  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./ssl/certbot/conf:/etc/letsencrypt
      - ./ssl/certbot/www:/var/www/certbot
    entrypoint: >
      sh -c "trap exit TERM; while :; do sleep 12h & wait $${!}; 
      certbot renew --webroot -w /var/www/certbot; done"

